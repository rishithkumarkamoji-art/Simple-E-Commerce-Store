<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <style>
    :root {
      --bg: #ffffff;
      --card-bg: #ffffff;
      --text: #202124;
      --text-muted: #5f6368;
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --border: #dadce0;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body.theme-google {
      background-color: #f0f4f9;
      color: #1f1f1f;
      --primary: #0b57d0;
      --primary-hover: #0842a0;
      --text: #1f1f1f;
      --text-muted: #444746;
      --border: #747775;
      --bg: #f0f4f9;
    }

    body.theme-apple {
      background-color: #000000;
      color: #f5f5f7;
      --bg: #000000;
      --card-bg: #000000;
      --text: #f5f5f7;
      --text-muted: #86868b;
      --primary: #0071e3;
      --primary-hover: #147ce5;
      --border: #424245;
    }

    body.theme-microsoft {
      background-color: #f2f2f2;
      color: #1b1b1b;
      --bg: #f2f2f2;
      --card-bg: #ffffff;
      --primary: #0067b8;
      --primary-hover: #005da6;
      --text: #1b1b1b;
      --text-muted: #676767;
      --border: #8c8c8c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .container {
      width: 100%;
      max-width: 450px;
      padding: 40px;
      background: var(--card-bg);
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    body.theme-google .container {
      border: 1px solid #dadce0;
      background: #ffffff;
      border-radius: 28px;
      max-width: 440px;
      box-shadow: none;
    }

    body.theme-apple .container {
      max-width: 380px;
      text-align: center;
      padding: 20px;
    }

    body.theme-microsoft .container {
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      border-radius: 0;
      padding: 44px;
      max-width: 440px;
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    body.theme-google .logo {
      justify-content: flex-start;
      margin-bottom: 16px;
    }

    body.theme-microsoft .logo {
      justify-content: flex-start;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 8px;
      color: var(--text);
    }
    body.theme-apple h1 {
      font-weight: 600;
      font-size: 24px;
      letter-spacing: -0.5px;
    }
    body.theme-microsoft h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    body.theme-apple .subtitle {
      font-size: 15px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .input-field {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
      background: transparent;
      color: var(--text);
      transition: border-color 0.2s ease;
    }

    body.theme-google .input-field {
      border-radius: 4px;
      border: 1px solid #747775;
      padding: 16px;
    }
    body.theme-google .input-field:focus {
      border-color: var(--primary);
      border-width: 2px;
      padding: 15px;
    }

    body.theme-apple .input-field {
      border-radius: 8px;
      background: #1c1c1e;
      border: 1px solid #3a3a3c;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    body.theme-apple .input-field:focus {
      border-color: var(--primary);
      background: #1c1c1e;
    }

    body.theme-microsoft .input-field {
      border-radius: 0;
      border-top: none;
      border-left: none;
      border-right: none;
      border-bottom: 1px solid #676767;
      padding: 8px 0;
    }
    body.theme-microsoft .input-field:focus {
      border-bottom-color: var(--primary);
    }

    .button-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
    }
    body.theme-apple .button-group {
      flex-direction: column-reverse;
      gap: 16px;
    }

    .btn {
      font-size: 14px;
      font-weight: 500;
      padding: 10px 24px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-primary {
      background-color: var(--primary);
      color: #ffffff;
    }
    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    body.theme-google .btn {
      border-radius: 100px;
      padding: 10px 24px;
      font-size: 14px;
    }

    body.theme-apple .btn-primary {
      width: 100%;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      background-color: #ffffff;
      color: #000000;
      font-weight: 600;
    }
    body.theme-apple .btn-primary:hover {
      background-color: #e8e8ed;
    }

    body.theme-microsoft .btn-primary {
      border-radius: 0;
      font-size: 15px;
      padding: 6px 12px;
      min-width: 108px;
      background-color: #0067b8;
    }

    .btn-link {
      background: none;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    body.theme-apple .btn-link {
      color: #0071e3;
      font-size: 14px;
    }
    body.theme-microsoft .btn-link {
      color: #0067b8;
      font-size: 13px;
    }

    .step {
      display: none;
    }
    .step.active {
      display: block;
      animation: fadeIn 0.25s ease-in-out;
    }

    .provider-logo-svg {
      width: 40px;
      height: 40px;
    }
    body.theme-google .provider-logo-svg {
      width: 75px;
      height: 24px;
    }
    body.theme-apple .provider-logo-svg {
      fill: #ffffff;
      width: 36px;
      height: 36px;
      margin: 0 auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-msg {
      color: #d93025;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
    body.theme-apple .error-msg {
      color: #ff453a;
    }
    body.theme-microsoft .error-msg {
      color: #e81123;
    }
  </style>
</head>
<body class="theme-google">
  <div class="container">
    <div class="logo" id="providerLogo">
      <!-- Injected by JS -->
    </div>
    
    <form id="loginForm" action="/auth/simulated/submit" method="POST">
      <input type="hidden" name="provider" id="providerInput">
      
      <!-- Step 1: Email -->
      <div class="step active" id="stepEmail">
        <h1 id="titleHeader">Sign in</h1>
        <div class="subtitle" id="subtitleText">to continue to Market Lane</div>
        
        <div class="form-group">
          <input type="email" id="emailInput" name="email" class="input-field" placeholder="Email address" required autocomplete="username">
          <div class="error-msg" id="emailError">Enter a valid email address</div>
        </div>
        
        <div class="button-group">
          <button type="button" class="btn-link" id="createAccountBtn">Create account</button>
          <button type="button" class="btn btn-primary" id="btnNext">Next</button>
        </div>
      </div>
      
      <!-- Step 2: Name (Simulating actual identification) -->
      <div class="step" id="stepName">
        <h1 id="welcomeHeader">Welcome</h1>
        <div class="subtitle" id="emailDisplay" style="word-break: break-all;"></div>
        
        <div class="form-group">
          <input type="text" id="nameInput" name="name" class="input-field" placeholder="Enter your full name" required autocomplete="name">
          <div class="error-msg" id="nameError">Name is required</div>
        </div>
        
        <div class="button-group">
          <button type="button" class="btn-link" id="btnBack">Back</button>
          <button type="submit" class="btn btn-primary" id="btnSubmit">Sign in</button>
        </div>
      </div>
    </form>
  </div>

  <script>
    const LOGOS = {
      google: `<svg viewBox="0 0 74 24" class="provider-logo-svg"><path fill="#ea4335" d="M66.4 12.3c0-3.3-2.5-5.8-5.7-5.8s-5.7 2.5-5.7 5.8c0 3.2 2.5 5.8 5.7 5.8s5.7-2.5 5.7-5.8zm-9.3 0c0-2 1.5-3.6 3.6-3.6s3.6 1.6 3.6 3.6c0 2-1.5 3.6-3.6 3.6s-3.6-1.6-3.6-3.6z"/><path fill="#fbbc05" d="M54 12.3c0-3.3-2.5-5.8-5.7-5.8s-5.7 2.5-5.7 5.8c0 3.2 2.5 5.8 5.7 5.8s5.7-2.5 5.7-5.8zm-9.3 0c0-2 1.5-3.6 3.6-3.6s3.6 1.6 3.6 3.6c0 2-1.5 3.6-3.6 3.6s-3.6-1.6-3.6-3.6z"/><path fill="#4285f4" d="M31.2 6.7v3.2h8c-.3 1.8-2 5.2-8 5.2-5.2 0-9.4-4.3-9.4-9.6s4.2-9.6 9.4-9.6c3 0 4.9 1.2 6 2.3l2.5-2.4C37.2.7 34.4 0 31.2 0 21.6 0 13.8 7.8 13.8 17.5S21.6 35 31.2 35c10 0 16.7-7 16.7-17 0-1.1-.1-2-.3-2.8h-16.4v-8.5z"/><path fill="#34a853" d="M78.6 6.8h-3.3v10.3c0 2.2-1.6 3.6-3.6 3.6-1.9 0-3-.9-3.5-2.2l-2.9 1.2c.9 2 2.8 3.5 6.4 3.5 3.8 0 6.9-2.3 6.9-7.2V6.8z"/><path fill="#4285f4" d="M85 6.8h-3.4v17h3.4V6.8z"/><path fill="#ea4335" d="M96.7 14.1c-1.3-1.8-3.1-3.2-5.7-3.2-5.1 0-9 4-9 9.1s3.8 9.2 9 9.2c4.1 0 6.6-2.5 7.6-4.1l-2.7-1.8c-.7 1.1-2 2.4-4.9 2.4-2.8 0-4.7-1.4-5.5-3.3l14.7-6.1-1.5-2.2zm-11.2 4.9c0-2.4 1.9-4.1 4.5-4.1 2 0 3.6 1 4.2 2.4L85.5 19z"/></svg>`,
      apple: `<svg viewBox="0 0 18 18" class="provider-logo-svg"><path d="M15.56 10.12c-.04-2.18 1.78-3.23 1.86-3.28-1.02-1.49-2.6-1.69-3.16-1.74-1.34-.14-2.63.79-3.31.79-.68 0-1.75-.78-2.88-.75-1.49.02-2.86.87-3.63 2.21-1.56 2.71-.4 6.72 1.12 8.92.74 1.07 1.62 2.27 2.78 2.23 1.12-.04 1.55-.73 2.91-.73 1.35 0 1.75.73 2.93.7 1.2-.02 1.97-1.08 2.71-2.16.86-1.25 1.21-2.47 1.23-2.53-.05-.02-2.38-.91-2.41-3.66zM13.2 3.19c.6-1.27.4-2.53.33-2.91-1.09.04-2.41.72-3.19 1.63-.68.78-1.27 2.06-1.12 3.42 1.22.1 2.44-.59 3.09-1.35z"/></svg>`,
      microsoft: `<svg viewBox="0 0 23 23" class="provider-logo-svg"><path fill="#f25022" d="M0 0h11v11H0z"/><path fill="#7fba00" d="M12 0h11v11H12z"/><path fill="#00a4ef" d="M0 12h11v11H0z"/><path fill="#ffb900" d="M12 12h11v11H12z"/></svg>`
    };

    const TITLES = {
      google: "Sign in",
      apple: "Sign in with Apple ID",
      microsoft: "Sign in"
    };

    const SUBTITLES = {
      google: "to continue to Market Lane",
      apple: "Use your Apple ID to sign in to Market Lane.",
      microsoft: "to continue to Market Lane"
    };

    const params = new URLSearchParams(window.location.search);
    const provider = (params.get("provider") || "google").toLowerCase();
    
    document.body.className = `theme-${provider}`;
    document.getElementById("providerInput").value = provider;
    document.getElementById("providerLogo").innerHTML = LOGOS[provider] || LOGOS.google;
    document.getElementById("titleHeader").innerText = TITLES[provider] || TITLES.google;
    document.getElementById("subtitleText").innerText = SUBTITLES[provider] || SUBTITLES.google;

    document.title = `Sign in with ${provider.charAt(0).toUpperCase() + provider.slice(1)}`;

    if (provider === "apple") {
      document.getElementById("emailInput").placeholder = "Apple ID";
    } else if (provider === "microsoft") {
      document.getElementById("emailInput").placeholder = "Email, phone, or Skype";
    }

    const stepEmail = document.getElementById("stepEmail");
    const stepName = document.getElementById("stepName");
    const emailInput = document.getElementById("emailInput");
    const nameInput = document.getElementById("nameInput");
    
    const btnNext = document.getElementById("btnNext");
    const btnBack = document.getElementById("btnBack");
    const emailDisplay = document.getElementById("emailDisplay");
    
    const emailError = document.getElementById("emailError");
    const nameError = document.getElementById("nameError");

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    btnNext.addEventListener("click", () => {
      const val = emailInput.value.trim();
      if (!validateEmail(val)) {
        emailError.style.display = "block";
        emailInput.style.borderColor = provider === "apple" ? "#ff453a" : (provider === "microsoft" ? "#e81123" : "#d93025");
        return;
      }
      emailError.style.display = "none";
      emailInput.style.borderColor = "";

      emailDisplay.innerText = val;
      stepEmail.classList.remove("active");
      stepName.classList.add("active");
      nameInput.focus();

      const prefix = val.split("@")[0];
      const guessedName = prefix.split(/[._-+]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
      nameInput.value = guessedName;
    });

    btnBack.addEventListener("click", () => {
      stepName.classList.remove("active");
      stepEmail.classList.add("active");
      emailInput.focus();
    });

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      if (!nameInput.value.trim()) {
        e.preventDefault();
        nameError.style.display = "block";
        nameInput.style.borderColor = provider === "apple" ? "#ff453a" : (provider === "microsoft" ? "#e81123" : "#d93025");
      }
    });

    emailInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        btnNext.click();
      }
    });
  </script>
</body>
</html>
